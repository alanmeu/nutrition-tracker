<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Nutri Cloud - Paiement confirme</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
        background: linear-gradient(180deg, #f5f8fc 0%, #e9eef6 100%);
        color: #123430;
      }
      .card {
        width: min(460px, calc(100vw - 32px));
        border: 1px solid #dbe6f0;
        border-radius: 14px;
        background: #fff;
        padding: 20px;
        text-align: center;
        box-shadow: 0 10px 35px rgba(15, 33, 54, 0.08);
      }
      .logo {
        width: 56px;
        height: 56px;
      }
      h1 {
        margin: 10px 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #5b736f;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img class="logo" src="/favicon.svg" alt="Nutri Cloud" />
      <h1>Paiement confirme</h1>
      <p>Ton abonnement est actif. Redirection vers ton suivi...</p>
    </main>
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        if (!params.get("checkout")) params.set("checkout", "success");
        if (!params.get("source")) params.set("source", "subscription");
        if (!params.get("target")) params.set("target", "suivi");
        const target = "/" + (params.toString() ? "?" + params.toString() : "");
        window.location.replace(target);
      })();
    </script>
  </body>
</html>
